# Basic SNMP configuration for network interfaces
# This uses the standard IF-MIB for port traffic
defaults:
  community: public
  version: 2

modules:
  if_mib:
    walk:
      - 1.3.6.1.2.1.2.2.1.10 # ifInOctets
      - 1.3.6.1.2.1.2.2.1.16 # ifOutOctets
      - 1.3.6.1.2.1.2.2.1.2  # ifDescr
    metrics:
      - ifInOctets
      - ifOutOctets
      - ifDescr
