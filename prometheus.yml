global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['192.168.1.12:9100']

  - job_name: 'main_pc'
    static_configs:
      - targets: ['192.168.1.10:9182']

  - job_name: 'gpu_exporter'
    static_configs:
      - targets: ['192.168.1.10:9835']

  - job_name: 'snmp_gateway'
    static_configs:
      - targets: ['192.168.1.254']
    metrics_path: /snmp
    params:
      module: [if_mib]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9116

  - job_name: 'snmp_switch'
    static_configs:
      - targets: ['192.168.1.129']
    metrics_path: /snmp
    params:
      module: [if_mib]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9116

  - job_name: 'bgw_exporter'
    static_configs:
      - targets: ['192.168.1.12:9085']
