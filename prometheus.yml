global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    static_configs:
      - targets: ['192.168.1.12:9100']

  - job_name: 'main_pc'
    static_configs:
      - targets: ['192.168.1.10:9182']

  - job_name: 'gpu_exporter'
    static_configs:
      - targets: ['192.168.1.10:9835']

  - job_name: 'bgw_exporter'
    static_configs:
      - targets: ['192.168.1.12:9085']
